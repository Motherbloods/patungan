name: Deploy Patungan Production

on:
    workflow_dispatch:

jobs:
    deploys:
        runs-on: self-hosted

        steps:
            - name: Checkout main branch
              uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0

            - name: Create Backend Env
              run: |
                  printf "%s" "${{ secrets.PATUNGAN_BE_ENV }}" > $GITHUB_WORKSPACE/patungan-be/.env

            - name: Create Frontend Env
              run: |
                  printf "%s" "${{ secrets.PATUNGAN_FE_ENV }}" > $GITHUB_WORKSPACE/patungan-fe/.env

            - name: Ensure network exists
              run: |
                  docker network inspect n8n-network >/dev/null 2>&1 || docker network create n8n-network

            - name: Build Backend
              run: |
                  docker build \
                    -t patungan-api-image \
                    $GITHUB_WORKSPACE/patungan-be

            - name: Restart Backend
              run: |
                  docker rm -f patungan-api || true
                  docker run -d \
                    --name patungan-api \
                    -p 3001:3000 \
                    --network n8n-network \
                    --restart unless-stopped \
                    --read-only \
                    -v patungan-logs:/app/logs \
                    --env-file $GITHUB_WORKSPACE/patungan-be/.env \
                    --cap-drop ALL \
                    patungan-api-image

            - name: Build Frontend
              run: |
                  set -a
                  . $GITHUB_WORKSPACE/patungan-fe/.env
                  set +a

                  docker build \
                    --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL \
                    --build-arg VITE_CREDENTIALS=$VITE_CREDENTIALS \
                    --build-arg VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID \
                    -t patungan-fe-image \
                    $GITHUB_WORKSPACE/patungan-fe

            - name: Restart Frontend
              run: |
                  docker rm -f patungan || true
                  docker run -d \
                    --name patungan \
                    -p 5176:5176 \
                    --network n8n-network \
                    --cap-drop ALL \
                    --cap-add SETGID \
                    --cap-add SETUID \
                    --cap-add NET_BIND_SERVICE \
                    patungan-fe-image

            - name: Cleanup Env Files
              if: always()
              run: |
                  rm -f $GITHUB_WORKSPACE/patungan-be/.env
                  rm -f $GITHUB_WORKSPACE/patungan-fe/.env
